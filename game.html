<head>
    <link rel="stylesheet" href="/main.css" />
</head>

<h1>game</h1>
<h2>client id: </h2>
<p id="clientId"></p>

<script>    
    // Create WebSocket connection.
    const socket = new WebSocket("ws://localhost:3000");

    window.socket = socket

    // Connection opened, this happens when someone creates a game and gets sent to a game page
    socket.addEventListener("open", (event) => {
        gameId = window.location.pathname.split("/").slice(-1)[0]
        // send server info about the client that is connecting
        const clientInfo = {
            gameId,
            type:"join"
        }
        socket.send(JSON.stringify(clientInfo));
    });

    // START websocket message handlers //
    function handleHello(data) {
            document.getElementById("clientId").innerText = data.clientId
    }

    // END websocket message handlers //

    // Listen for messages
    socket.addEventListener("message", (event) => {

        const data = JSON.parse(event.data)
        console.log("Message from server ", data);

        switch (data.type) {
            case "hello":
                handleHello(data)
        }

    });

    document.addEventListener("DOMContentLoaded", (event) => {
        
    });
</script>

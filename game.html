<head>
    <link rel="stylesheet" href="/main.css" />
</head>



<div class="main" id="main">

    <div class="gameInfoSection">
        <div class="gameInfo">
            <h1 class="header" id="gameHeader">game: </h1>
            <div class= "players" id="numPlayersInfo">
                <h2 class="gameInfoSectionLabel">players:</h2>
                <p class="numPlayers", id="numPlayers">1</p>
            </div>
        </div>
        
        <div id="messageLog" class="messageLog"></div>
    </div>

    <div id="gameUI" class="gameUI">
        <h1 id="gameInfoText" class="gameInfoText">Waiting for another player to join...</h1>
        <div id="gameElements" class="gameElements"></div>
    </div>


</div>

<script>
    const messages  = []
    let messageNum = 0;

    // Create WebSocket connection.
    const socket = new WebSocket("ws://localhost:3000");

    const gameId = window.location.pathname.split("/").slice(-1)[0];
    let clientId = undefined; // this gets set when hello payload is received from server

    // Connection opened, open a websocket now that someone is on the game page
    socket.addEventListener("open", (event) => {
        const gameHeader = document.getElementById("gameHeader")
        gameHeader.textContent = "game: " + gameId
        // send server info about the client that is connecting
        const clientInfo = {
            gameId: gameId,
            type:"join"
        }
        socket.send(JSON.stringify(clientInfo));
    });

    // START html generation 

    function createMessage(message) {
        const messageDiv = document.createElement("div")
        messageDiv.className = "message"
        messageDiv.id = "message" + messageNum
        const messageText = document.createElement("p")
        messageText.innerText = message
        messageText.className = "messageText"

        messageDiv.appendChild(messageText)

        const messageLog = document.getElementById("messageLog")
        messageLog.appendChild(messageDiv)

        if ((messageDiv.offsetTop + messageDiv.offsetHeight) > (messageLog.offsetTop + messageLog.offsetHeight)) {
            messages[0].remove()
            messages.shift(); // removes first element from list
        }

        messages.push(messageDiv)
        messageNum += 1;
    }

    function addGameOption(optionName) {
        const gameButton = document.createElement("button")
        gameButton.className = "gameButton"
        gameButton.class = "fade-in"
        gameButton.addEventListener("click", async () => {
            console.log("selected " + optionName + "!");
            const gameMessage = {
                clientId,
                optionName,
                type: "select"
            }
            socket.send(JSON.stringify(gameMessage))
            removeGameElements()
            updateGameInfoText("Waiting for other player to choose...")
        })

        const img = document.createElement("img")
        img.src="/images/" + optionName + ".png"
        img.className = "weaponImage"

        gameButton.appendChild(img)

        const gameElements = document.getElementById("gameElements")
        gameElements.appendChild(gameButton);
    }

    function addGameOptions() {
        addGameOption("rock");
        addGameOption("paper");
        addGameOption("scissors");
    }

    function updateGameInfoText(newText) {
        const gameInfoText = document.getElementById("gameInfoText");
        gameInfoText.textContent = newText
    }

    function removeGameElements() {
        const gameElements = document.getElementById("gameElements")
        while (gameElements.firstChild) {
            gameElements.removeChild(gameElements.firstChild);
        }
    }

    // END html generation

    // START websocket message handlers //
    function handleHello(data) {
        clientId = data.clientId
        document.getElementById("clientId").innerText = data.clientId
        document.getElementById("numPlayers").innerText = data.players.length
    }

    function handleJoin(data) {
        // update number of displayed players
        document.getElementById("numPlayers").innerText = data.numClients

        // log a message saying that someone has joined
        console.log("client " + data.joinId + " has joined!")
        createMessage("Another player has joined!")
    }

    function handleGameStart(data) {
        console.log("Game started!");
        createMessage("Game started!");
        addGameOptions();
        updateGameInfoText("Choose your weapon!")
    }

    function handleGameEnd(data) {
        console.log("Game ended!");
        createMessage("Game ended!")
        removeGameElements();
        updateGameInfoText("Waiting for another player to join...")
    }

    function handleLeave(data) {
        // update number of displayed players
        document.getElementById("numPlayers").innerText = data.numClients
        // log a message saying that someone has left
        console.log("client " + data.leaveId + " has left!")
        createMessage("A player has left!")
    }

    function handleResult(data) {
        console.log(data.winner)
        if (data.winner) {
            if (clientId == data.winner) {
                console.log("You win!")
                createMessage("You win!")
            } else {
                console.log("You lose!")
                createMessage("You lose!")
            }
        } else {
            console.log("It's a tie!")
            createMessage("It's a tie!")
        }
        addGameOptions()
        updateGameInfoText("Choose your weapon!")
    }

    // END websocket message handlers //

    function createMessage(message) {
        const messageDiv = document.createElement("div")
        messageDiv.className = "message"
        messageDiv.id = "message" + messageNum
        const messageText = document.createElement("p")
        messageText.innerText = message
        messageText.className = "messageText"

        messageDiv.appendChild(messageText)

        const messageLog = document.getElementById("messageLog")
        messageLog.appendChild(messageDiv)

        if ((messageDiv.offsetTop + messageDiv.offsetHeight) > (messageLog.offsetTop + messageLog.offsetHeight)) {
            messages[0].remove()
            messages.shift(); // removes first element from list
        }

        messages.push(messageDiv)
        messageNum += 1;
    }

    // Listen for messages
    socket.addEventListener("message", (event) => {

        const data = JSON.parse(event.data)
        console.log("Message from server ", data);

        switch (data.type) {
            case "hello":
                handleHello(data)
                break;
            case "join":
                handleJoin(data)
                break;
            case "leave":
                handleLeave(data)
                break;
            case "gameStart":
                handleGameStart(data)
                break;
            case "gameEnd":
                handleGameEnd(data)
                break;
            case "result":
                handleResult(data);
                break;
            default:
                console.log("Unknown message type")
                socket.close()
        }

    });

    document.addEventListener("DOMContentLoaded", (event) => {
        
    });
</script>

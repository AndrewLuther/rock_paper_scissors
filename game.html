<h1>game</h1>
<h2>client id: </h2>
<p id="client_id"></p>

<script>
    // should I be using a cookie for this or something? Jack HELP
    client_id = Math.random()
    document.getElementById("client_id").innerText = client_id

    // Create WebSocket connection.
    const socket = new WebSocket("ws://localhost:3000");

    window.socket = socket

    // Connection opened, this happens when someone creates a game and gets sent to a game page
    socket.addEventListener("open", (event) => {
        room_id = window.location.pathname.split("/").slice(-1)[0]
        // send server info about the client that is connecting
        const clientInfo = {
            client_id: client_id,
            room_id: room_id
        }
        socket.send(JSON.stringify(clientInfo));
    });

    // Listen for messages
    socket.addEventListener("message", (event) => {
        console.log("Message from server ", event.data);
    });

    document.addEventListener("DOMContentLoaded", (event) => {
        
    });
</script>

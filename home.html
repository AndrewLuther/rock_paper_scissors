<head>
    <link rel="stylesheet" href="/main.css" />
</head>


<h1 class="header">rock paper scissors</h1>
<div class="create-game">
    <button id="create" class="create-game-button">create game</button>
</div>

<div id="games" class="games"></div>
<script>

    // Create WebSocket connection.
    const socket = new WebSocket("ws://localhost:3000");
    socket.addEventListener("open", (event) => {
        const clientInfo = {
            type:"homepageJoin"
        }
        socket.send(JSON.stringify(clientInfo));
    });

    function handleHello(data) {
        const gamesDiv = document.getElementById("games")
        data.gameList.forEach((game) => {
            const div = makeGameDiv(game)
            gamesDiv.appendChild(div)
        });
    }

    // Listen for messages
    socket.addEventListener("message", (event) => {
        const data = JSON.parse(event.data)
        console.log("Message from server ", data);
        switch (data.type){
            case "hello":
                handleHello(data)
                break;
            case "newGame":
                console.log("a new game started")
                break;
            default:
                console.log("Unknown message type")
                socket.close()
        }
    });

    function makeGameDiv(gameObject) {
        const div = document.createElement("div");
        div.className = "game"

        const gameTitle = document.createElement("h2")
        gameTitle.innerText = gameObject.id
        gameTitle.className = "gameTitle"

        const joinGameButton = document.createElement("button")
        joinGameButton.innerText = "join game"
        joinGameButton.id = gameObject.id + "JoinButton"
        joinGameButton.addEventListener("click", () => {
            window.location = "/game/" + gameObject.id
        })

        const playerCount = document.createElement("p");
        playerCount.innerText = "players: " + gameObject.numPlayers + "/2";
        playerCount.className = "gamePlayers";

        div.appendChild(gameTitle)
        div.appendChild(playerCount)
        div.appendChild(joinGameButton)
        
        return div
    }

    document.addEventListener("DOMContentLoaded", async (event) => {

        // Create the event listener for the create game button
        console.log("DOM fully loaded and parsed");
        const button = document.getElementById("create")
        button.addEventListener("click", async () => {
            const response = await fetch("/api/create-game", {
                method: "POST"
            });

            const data = await response.json()
            window.location = "/game/" + data.id
        })

        // // Create the list of games
        // const response = await fetch("/api/get-games", {
        //     method: "GET"
        // });

        // const games = await response.json()
        
        // const gamesDiv = document.getElementById("games")
        // games.forEach((game) => {
        //     const div = makeGameDiv(game)
        //     gamesDiv.appendChild(div)
        // });
    });
</script>
